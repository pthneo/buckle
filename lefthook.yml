pre-commit:
  jobs:
    - run: bun check

pre-push:
  commands:
    test:
      run: bun test
    check:
      run: bun check

commit-msg:
  commands:
    conventional:
      run: |
        grep -qE "^(feat|fix|chore|docs|refactor|test|ci)(\(.+\))?: .+" {1} || \
          (echo "Use conventional commit format: feat: description" && exit 1)